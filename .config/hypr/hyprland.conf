source = ~/.config/hypr/keybindings.conf

################
### MONITORS ### https://wiki.hypr.land/Configuring/Monitors/
################

monitor=DP-3, 2560x1440@165, 0x0, 1
monitor=HDMI-A-1, 1920x1080@75, 2560x0, 1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nautilus
$menu = rofi -modes "drun,filebrowser,window" -show drun -theme $"~/.config/rofi/launchers/type-2"/$'style-2'.rasi
$browser = firefox
$musicplayer = spotify #flatpak run io.github.purplehorrorrus.Meridius
$cursor = hyprctl setcursor Sunset-cursors 24

#################
### AUTOSTART ###
#################

exec-once = hyprlock & waybar & $cursor & swww-daemon
exec-once = blueman-manager & $musicplayer &  happ

############################# Refer to https://wiki.hypr.land/Configuring/Variables/
### ENVIRONMENT VARIABLES ### https://wiki.hypr.land/Configuring/Environment-variables/
############################# https://wiki.hypr.land/Configuring/Variables/#general

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct

##################### https://wiki.hypr.land/Configuring/Variables/#variable-types
### LOOK AND FEEL ### https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
##################### https://wiki.hypr.land/Configuring/Variables/#decoration
#                     https://wiki.hypr.land/Configuring/Variables/#animations
#                     https://wiki.hypr.land/Configuring/Dwindle-Layout/
#                     https://wiki.hypr.land/Configuring/Variables/#misc

general {
    gaps_in = 5
    gaps_out = 15
    border_size = 3

    col.active_border = rgba(fbf1c7ee)
    col.inactive_border = rgba(a89984ee)

    allow_tearing = false
    layout = dwindle
}
decoration {
    rounding = 15
    rounding_power = 3

    active_opacity = 1.0
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(251, 241, 199, 0.5)
        color_inactive = rgba(251, 241, 199, 0.2)
    }
    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1696
    }
}
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background.
    disable_splash_rendering = true
    vrr = 1 # FreeSync/G-Sync 0(off) 1(on) 2(only in fullscreen)
    enable_swallow = true
    focus_on_activate = false
    mouse_move_enables_dpms = true # Wake up monitor in enegrysave by mouse
    key_press_enables_dpms = true
}
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

################## https://wiki.hypr.land/Configuring/Animations/#curves
### ANIMATIONS ### https://wiki.hypr.land/Configuring/Animations/
################## 


animations {
    enabled = yes, please :)

#   curves   NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = smooth,         0.25, 0.1,  0.25, 1
    bezier = fastend, 0.5, 0.0, 0.9, 0.7

#   animations  NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint

    animation = windows,       1,     5,     easeOutQuint
    animation = windowsIn,     1,     2,     fastend,       slide
    animation = windowsOut,    1,     100,   smooth,       slide
    animation = windowsMove,   1,     2,     fastend,       slide

    animation = fadeIn,        0,     1.73,  almostLinear
    animation = fadeOut,       1,     1,     linear
    animation = fade,          1,     3.03,  quick
    animation = fadeShadow,    1,     1000,  linear

    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     6,     easeOutQuint, popin
    animation = layersOut,     1,     2.5,   linear,       popin
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear

    animation = workspaces,    1,     100,   almostLinear, slidefade
    animation = workspacesIn,  1,     2,     almostLinear, slide
    animation = workspacesOut, 1,     1.94,  almostLinear, slide
}

############# https://wiki.hypr.land/Configuring/Variables/#input
### INPUT ### https://wiki.hypr.land/Configuring/Gestures
#############

input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:ralt_toggle, grp:rshift_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = -0.6 # -1.0 - 1.0
}
gesture = 3, horizontal, workspace

############################## https://wiki.hypr.land/Configuring/Window-Rules/
### WINDOWS AND WORKSPACES ### https://wiki.hypr.land/Configuring/Workspace-Rules/
##############################

# for screenshots without borders created by slurp
layerrule = no_anim on, match:title slurp

workspace = 1, monitor:DP-3
workspace = 2, monitor:DP-3
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}
windowrule = match:class code-oss, opacity 0.85 override 0.85
windowrule = match:class org.gnome.Nautilus, opacity 0.85 override 0.85
windowrule = match:class obsidian, opacity 0.85 override 0.85
windowrule = match:class spotify, opacity 1.25 override 1.25
windowrule = match:class firefox, opacity 1.25 override 1.25
windowrule = match:title clock, opacity 1.25 override 1.25
#windowrule = workspace 3 silent class:^(firefox)$

