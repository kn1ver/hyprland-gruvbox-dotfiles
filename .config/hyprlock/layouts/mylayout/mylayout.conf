# $wall = $HOME/.config/hyprlock/wallpapers/hyprlock.png
# source = $HOME/.config/hyprlock/fonts/SF Pro Display Bold

$hyprlock_dir = $HOME/.config/hyprlock
$wall = $hyprlock_dir/images/wallpapers.webp
$profile_image = $hyprlock_dir/images/profile-image.jpg
$mpris_art = /tmp/hyde-mpris.png
$artfile = /tmp/hyde-mpris-blurred.png

# Background
background {
    monitor =
    path = $wall

    blur_passes = 2
    blur_size = 10

    contrast = 0.8916
    brightness = 0.8916
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# General
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Main div
shape {
    monitor =
    size = 650, 650
    rounding = 25
    color = rgba(255,255,255,0.2)
}

# Profie Photo
image {
    monitor =
    path = $profile_image
    border_size = 2
    border_color = $primary_3_rgba 
    rounding = -1
    rotate = 0
    position = 0, 190
    halign = center
    valign = center
}

# User Name #1
label {
    monitor =
    text = $USER
    color = rgba(216, 222, 233, 0.80)
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 20
    font_family = Ubuntu Bold
    position = 0, 80
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.80)
    font_size = 60
    font_family = Ubuntu Bold
    position = 0, -20
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%B %d %A")"
    color = rgba(216, 222, 233, .80)
    font_size = 19
    font_family = Ubuntu Bold
    position = 0, -90
    halign = center
    valign = center
}


# User Name Div
shape {
    monitor =
    size = 320, 55
    color = rgba(255, 255, 255, 0.1)
    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 1)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 0, -190
    halign = center
    valign = center
    
}

# User Name #2
label {
    monitor =
    text =    $USER
    color = rgba(216, 222, 233, 0.80)
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 16
    font_family = Ubuntu Bold
    position = 0, -190
    halign = center
    valign = center
}

# Input Field
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Ubuntu Bold
    placeholder_text = <span foreground="##ffffff99">    Password</span>
    hide_input = false
    position = 0, -268
    halign = center
    valign = center
}

# Music Div
shape {
    monitor =
    size = 350, 140
    rounding = 25
    color = rgba(255,255,255,0.2)
    rotate = 0
    position = -150, -410
    halign = center
    valign = center
    zindex = 1
}
# Music Widget
source = $hyprlock_dir/layouts/mylayout/player.conf

# Weather Div
shape {
    monitor =
    size = 285, 140
    rounding = 25
    color = rgba(255,255,255,0.2)
    rotate = 0
    position = 182.5, -410
    halign = center
    valign = center
    zindex = 1
}
# Weather Widget
source = $hyprlock_dir/layouts/mylayout/weather.conf


# Power-Menu Divs
# Poweroff
shape {
    monitor =
    size = 50, 50
    rounding = 15
    color = rgba(255,255,255,0.2)
    rotate = 0
    position = 280, 360
    halign = center
    valign = center
    zindex = 1
}

# Reboot
shape {
    monitor =
    size = 50, 50
    rounding = 15
    color = rgba(255,255,255,0.2)
    rotate = 0
    position = 220, 360
    halign = center
    valign = center
    zindex = 1
}

# Lang Layout
shape {
    monitor =
    size = 50, 50
    rounding = 15
    color = rgba(255,255,255,0.2)
    rotate = 0
    position = 160, 360
    halign = center
    valign = center
    zindex = 1
}

# Power Menu Buttons
source = $hyprlock_dir/layouts/mylayout/powermenu.conf
