# If your monitors have diffrent resolutions you may need to change positions of some elemets
# Here are only posotions for 2560x1440 (monitor1) and 1920x1080 (monitor2)

# Weather Icon
image {
    path = ~/.cache/openweather/icon.png
    size = 50
    position = 80, -380
    halign = center
    valign = center
    reload_time = 1800
}

# City
label {
    monitor = $monitor1
    text = $city
    color = rgba(255, 255, 255, 0.8)
    font_size = 16
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 1400, -365
    halign = left
    valign = center
    zindex = 5
}

# Temperature
label {
    monitor = $monitor1
    text = cmd[update:1800] $weather $openweather_key $city | awk '{print $1}'
    color = rgba(255, 255, 255, 0.8)
    font_size = 12
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 1420, -400
    halign = left
    valign = center
    zindex = 5
}

# Temperature Icon
label {
    monitor = $monitor1
    text = 
    color = rgba(255, 255, 255, 0.8)
    font_size = 15
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 1400, -400
    halign = left
    valign = center
    zindex = 5
}

# Wind
label {
    monitor = $monitor1
    text = cmd[update:1800] $weather $openweather_key $city | awk '{print $2}'
    color = rgba(255, 255, 255, 0.8)
    font_size = 12
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 1430, -425
    halign = left
    valign = center
    zindex = 5
}
# Wind Icon
label {
    monitor = $monitor1
    text = 
    color = rgba(255, 255, 255, 0.8)
    font_size = 17
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 1400, -425
    halign = left
    valign = center
    zindex = 5
}



# Weather Source
label {
    monitor = $monitor1
    text = Open Weather Map
    color = rgba(255, 255, 255, 0.6)
    font_size = 10
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 1335, -460
    halign = left
    valign = center
    zindex = 5
}
# Weather Source Icon
label {
    monitor = $monitor1
    text = 󰖐
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 1470, -460
    halign = left
    valign = center
    zindex = 5
}

